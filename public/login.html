<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Validify Login</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #eef2f7;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }

    .auth-card {
      width: min(780px, 100%);
      background: #ffffff;
      border-radius: 28px;
      padding: 52px 70px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .auth-header h1 {
      margin: 0;
      font-size: 48px;
      font-weight: 900;
      color: #111827;
    }

    .auth-header p {
      margin: 14px 0 0;
      color: #5d6f8b;
      font-size: 17px;
      font-style: italic;
    }

    .tab-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 22px;
    }

    .tab-btn {
      height: 48px;
      border: none;
      border-radius: 12px;
      background: #edf2fb;
      color: #1f2937;
      font-weight: 900;
      cursor: pointer;
    }

    .tab-btn.active {
      background: #2f66e8;
      color: #ffffff;
    }

    .message {
      display: none;
      padding: 14px;
      border-radius: 10px;
      margin-bottom: 18px;
      font-weight: 800;
      text-align: center;
    }

    .message.show {
      display: block;
    }

    .message.error {
      background: #fee2e2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .message.success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .form-panel {
      display: none;
    }

    .form-panel.active {
      display: block;
    }

    .field {
      position: relative;
      margin-bottom: 22px;
    }

    .field i {
      position: absolute;
      left: 22px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      font-size: 20px;
    }

    input, select {
      width: 100%;
      height: 64px;
      border: 1px solid #d6deea;
      border-radius: 10px;
      background: #fbfcfe;
      padding: 0 18px 0 70px;
      outline: none;
      font-size: 16px;
    }

    select {
      appearance: auto;
    }

    input:focus, select:focus {
      border-color: #2f66e8;
      box-shadow: 0 0 0 2px rgba(47, 102, 232, 0.12);
    }

    .submit-btn {
      width: 100%;
      height: 58px;
      border: none;
      border-radius: 10px;
      background: #2f66e8;
      color: #ffffff;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      margin-top: 8px;
    }

    @media (max-width: 720px) {
      .auth-card {
        padding: 34px 24px;
      }

      .auth-header h1 {
        font-size: 36px;
      }
    }
  </style>
</head>

<body>
  <main class="auth-card">
    <div class="auth-header">
      <h1 id="authTitle">Login</h1>
      <p>Validify role-based vendor assessment portal</p>
    </div>

    <div class="tab-row">
      <button class="tab-btn active" type="button" data-auth-tab="login">Login</button>
      <button class="tab-btn" type="button" data-auth-tab="register">Register</button>
    </div>

    <div class="message" id="messageBox"></div>

    <form class="form-panel active" id="loginForm">
      <div class="field">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="loginEmail" placeholder="Email" required />
      </div>

      <div class="field">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="loginPassword" placeholder="Password" required />
      </div>

      <button class="submit-btn" type="submit">Login</button>
    </form>

    <form class="form-panel" id="registerForm">
      <div class="field">
        <i class="fa-solid fa-user"></i>
        <input type="text" id="registerName" placeholder="Full Name" required />
      </div>

      <div class="field">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="registerEmail" placeholder="Email" required />
      </div>

      <div class="field">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="registerPassword" placeholder="Password" required />
      </div>

      <div class="field">
        <i class="fa-solid fa-briefcase"></i>
        <select id="registerRole" required>
          <option value="">Select account type</option>
          <option value="employee">Employee</option>
          <option value="it">IT</option>
          <option value="infosec">InfoSec</option>
          <option value="management">Management</option>
          <option value="dpo">DPO</option>
          <option value="hr">HR</option>
          <option value="compliance">Compliance</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <button class="submit-btn" type="submit">Create Account</button>
    </form>
  </main>

  <script src="login.js"></script>
</body>
</html>
