<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Validify Department Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/department.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div>
      <div class="brand"><img src="images/validify-logo.png" alt="Validify"><h1>Validify</h1></div>
      <nav class="nav">
        <button data-page="dashboard" class="active"><i class="fa-solid fa-house"></i> Dashboard</button>
        <button data-page="review"><i class="fa-solid fa-list-check"></i> Assigned Review</button>
        <button data-page="notifications"><i class="fa-solid fa-bell"></i> Notifications</button>
      </nav>
    </div>
    <div class="account-wrap">
      <button class="account-card" id="accountToggle" type="button"><span class="account-left"><span class="avatar" id="avatar">D</span><span><span class="account-name" id="accountName">Department</span><br><span class="account-role" id="accountRole">Reviewer</span></span></span><i class="fa-solid fa-chevron-right"></i></button>
      <div class="menu hidden" id="accountMenu"><button type="button" id="helpBtn"><i class="fa-solid fa-circle-question"></i> Help</button><button type="button" class="logout" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button></div>
    </div>
  </aside>
  <main class="main">
    <header class="topbar"><div><p id="roleSubtext">Department Reviewer</p><h2 id="pageTitle">Dashboard</h2></div><button class="btn secondary" id="refreshBtn"><i class="fa-solid fa-rotate"></i> Refresh</button></header>
    <section class="page active" id="dashboardPage">
      <div class="grid stats"><div class="card stat"><p>Total Assigned</p><h3 id="statAssigned">0</h3></div><div class="card stat"><p>Pending</p><h3 id="statPending">0</h3></div><div class="card stat"><p>Submitted</p><h3 id="statSubmitted">0</h3></div><div class="card stat"><p>Rejected Recommended</p><h3 id="statRejected">0</h3></div></div>
      <div class="card"><h3>Assigned Vendor Assessments</h3><div class="table-wrap"><table><thead><tr><th>Code</th><th>Vendor</th><th>Purpose</th><th>Status</th><th>Recommendation</th><th>Action</th></tr></thead><tbody id="reviewRows"></tbody></table></div></div>
    </section>
    <section class="page" id="reviewPage">
      <div class="card"><h3>Review Vendor Due Diligence</h3><div class="field"><label>Select Assigned Review</label><select id="reviewSelect"></select></div><div id="vendorAnswersWrap" class="grid"></div></div>
      <div class="card"><h3>Department Findings, Recommendation, Evidence, and Sign-off</h3><form id="departmentReviewForm"><div class="field"><label>Findings</label><textarea id="findings" required></textarea></div><div class="field"><label>Comments</label><textarea id="comments" required></textarea></div><div class="form-grid"><div class="field"><label>Recommendation</label><select id="recommendation" required><option value="">Select recommendation</option><option>Approved</option><option>Approved with Conditions</option><option>Requires Remediation</option><option>Rejected</option></select></div><div class="field"><label>Signer Name</label><input id="signerName" required></div></div><div class="form-grid"><div class="field"><label>Evidence PDF</label><input type="file" id="evidence" accept="application/pdf,.pdf"></div><div class="field"><label>Signature Image</label><input type="file" id="signature" accept="image/png,image/jpeg,.png,.jpg,.jpeg"></div></div><div class="actions"><button class="btn green" type="submit">Submit Review & Sign-off</button></div></form></div>
    </section>
    <section class="page" id="notificationsPage"><div class="card"><h3>Notifications</h3><div id="notificationList"></div></div></section>
  </main>
</div>
<div class="toast" id="toast"></div>
<script src="js/department.js"></script>
</body>
</html>
